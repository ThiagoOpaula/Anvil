name: Rust CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --verbose
      - run: cargo check --features gui --verbose

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (GUI)
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-x11-dev libwayland-dev libgtk-3-dev
      - run: cargo clippy --verbose
      - run: cargo clippy --features gui --verbose

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        features: ["", "gui"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux GUI)
        if: matrix.os == 'ubuntu-latest' && matrix.features == 'gui'
        run: sudo apt-get update && sudo apt-get install -y libxkbcommon-x11-dev libwayland-dev libgtk-3-dev
      - name: Build
        run: |
          if [ "${{ matrix.features }}" = "gui" ]; then
            cargo build --features gui --verbose
          else
            cargo build --verbose
          fi
        shell: bash
      - name: Run tests
        run: |
          if [ "${{ matrix.features }}" = "gui" ]; then
            cargo test --features gui --verbose
          else
            cargo test --verbose
          fi
        shell: bash
